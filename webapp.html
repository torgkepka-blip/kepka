<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CodeObfuscator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Rajdhani:wght@400;500;600;700&display=swap');

  :root {
    --bg:        #0a0c10;
    --bg2:       #0f1218;
    --bg3:       #151a22;
    --border:    #1e2736;
    --accent:    #00d4ff;
    --accent2:   #7c3aed;
    --accent3:   #10b981;
    --danger:    #ef4444;
    --warn:      #f59e0b;
    --text:      #e2e8f0;
    --muted:     #64748b;
    --card-glow: 0 0 24px rgba(0,212,255,0.08);
    --radius:    12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    min-height: 100vh;
    overscroll-behavior: none;
  }

  /* ── Noise texture overlay ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Layout ── */
  .app {
    max-width: 480px;
    margin: 0 auto;
    padding: 16px 16px 32px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    animation: fadeIn .35s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--card-glow);
    position: relative;
    overflow: hidden;
  }
  .header::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }
  .header-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .header-text h1 {
    font-size: 20px; font-weight: 700;
    color: var(--text); letter-spacing: .5px;
  }
  .header-text p {
    font-size: 13px; color: var(--muted); margin-top: 1px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── Card ── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    box-shadow: var(--card-glow);
  }
  .card-label {
    font-size: 12px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1.2px;
    color: var(--accent); margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-label::after {
    content: ''; flex: 1; height: 1px;
    background: var(--border);
  }

  /* ── Language selector ── */
  .lang-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .lang-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 8px;
    cursor: pointer;
    text-align: center;
    transition: all .2s ease;
    display: flex; flex-direction: column;
    align-items: center; gap: 8px;
    user-select: none;
  }
  .lang-btn .icon {
    font-size: 24px; line-height: 1;
  }
  .lang-btn .name {
    font-size: 14px; font-weight: 600;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .lang-btn.active {
    border-color: var(--accent);
    background: rgba(0,212,255,.06);
    box-shadow: 0 0 16px rgba(0,212,255,.15);
  }
  .lang-btn.active .name { color: var(--accent); }
  .lang-btn:active { transform: scale(.96); }

  /* ── Upload zone ── */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 28px 16px;
    text-align: center;
    cursor: pointer;
    transition: all .2s ease;
    position: relative;
    overflow: hidden;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: rgba(0,212,255,.04);
  }
  .upload-zone input {
    position: absolute; inset: 0;
    opacity: 0; cursor: pointer; width: 100%;
  }
  .upload-zone .upload-icon { font-size: 32px; margin-bottom: 8px; }
  .upload-zone .upload-title {
    font-size: 16px; font-weight: 600; color: var(--text);
  }
  .upload-zone .upload-sub {
    font-size: 12px; color: var(--muted); margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── File info ── */
  .file-info {
    display: none;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    align-items: center;
    gap: 10px;
  }
  .file-info.show { display: flex; }
  .file-info .fi-icon { font-size: 24px; flex-shrink: 0; }
  .file-info .fi-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    flex: 1;
  }
  .file-info .fi-size { font-size: 12px; color: var(--muted); flex-shrink: 0; }
  .file-info .fi-remove {
    background: none; border: none;
    color: var(--danger); cursor: pointer; font-size: 18px;
    padding: 2px; line-height: 1; flex-shrink: 0;
  }

  /* ── Status bar ── */
  .status-bar {
    display: none;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    gap: 10px;
    align-items: center;
  }
  .status-bar.show { display: flex; }
  .status-bar .st-icon { font-size: 20px; flex-shrink: 0; }
  .status-bar .st-text { font-size: 14px; font-weight: 600; }
  .status-bar .st-sub  { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .status-bar.pending  .st-icon::after { content: '⏳'; }
  .status-bar.done     { border-color: var(--accent3); background: rgba(16,185,129,.06); }
  .status-bar.done     .st-icon::after { content: '✅'; }
  .status-bar.error    { border-color: var(--danger); background: rgba(239,68,68,.06); }
  .status-bar.error    .st-icon::after { content: '❌'; }

  /* ── Progress ── */
  .progress-wrap {
    display: none;
    height: 4px; background: var(--border);
    border-radius: 2px; overflow: hidden;
  }
  .progress-wrap.show { display: block; }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 2px;
    transition: width .3s ease;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50%      { opacity: .6; }
  }
  .progress-bar.done { animation: none; opacity: 1; }

  /* ── Buttons ── */
  .btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: var(--radius);
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px; font-weight: 700;
    letter-spacing: .5px;
    cursor: pointer;
    transition: all .2s ease;
    display: flex; align-items: center;
    justify-content: center; gap: 10px;
    position: relative; overflow: hidden;
  }
  .btn::before {
    content: '';
    position: absolute; inset: 0;
    background: rgba(255,255,255,0);
    transition: background .2s;
  }
  .btn:active::before { background: rgba(255,255,255,.05); }
  .btn:active { transform: scale(.98); }
  .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: #fff;
    box-shadow: 0 4px 20px rgba(0,212,255,.2);
  }
  .btn-primary:hover:not(:disabled) {
    box-shadow: 0 4px 28px rgba(0,212,255,.35);
    filter: brightness(1.05);
  }

  .btn-success {
    background: linear-gradient(135deg, #065f46, var(--accent3));
    color: #fff;
    box-shadow: 0 4px 20px rgba(16,185,129,.2);
  }

  .btn-tg {
    background: linear-gradient(135deg, #0f3460, #1a73e8);
    color: #fff;
    box-shadow: 0 4px 20px rgba(26,115,232,.2);
  }

  .btn-secondary {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .btn-group {
    display: flex; flex-direction: column; gap: 10px;
    display: none;
  }
  .btn-group.show { display: flex; }

  /* ── Spinner ── */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Demo badge ── */
  .demo-badge {
    background: rgba(245,158,11,.1);
    border: 1px solid rgba(245,158,11,.3);
    color: var(--warn);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px; line-height: 1.5;
    font-family: 'JetBrains Mono', monospace;
  }
  .demo-badge strong { display: block; margin-bottom: 2px; }

  /* ── Grid glow bg ── */
  .app-bg {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(124,58,237,.07) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(0,212,255,.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  .app { position: relative; z-index: 1; }
</style>
</head>
<body>

<div class="app-bg"></div>

<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-icon">🔨</div>
    <div class="header-text">
      <h1>CodeObfuscator</h1>
      <p>// demo edition</p>
    </div>
  </div>

  <!-- Language select -->
  <div class="card">
    <div class="card-label">Язык кода</div>
    <div class="lang-grid">
      <button class="lang-btn active" data-lang="javascript" onclick="selectLang(this)">
        <span class="icon">🟨</span>
        <span class="name">JS</span>
      </button>
      <button class="lang-btn" data-lang="python" onclick="selectLang(this)">
        <span class="icon">🐍</span>
        <span class="name">Python</span>
      </button>
      <button class="lang-btn" data-lang="java" onclick="selectLang(this)">
        <span class="icon">☕</span>
        <span class="name">Java</span>
      </button>
    </div>
  </div>

  <!-- File upload -->
  <div class="card">
    <div class="card-label">Загрузка файла</div>
    <div class="upload-zone" id="uploadZone"
         ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropFile(event)">
      <input type="file" id="fileInput" accept=".js,.py,.java,.txt" onchange="fileSelected()">
      <div class="upload-icon">📂</div>
      <div class="upload-title">Нажми или перетащи файл</div>
      <div class="upload-sub">.js &nbsp;·&nbsp; .py &nbsp;·&nbsp; .java &nbsp;·&nbsp; .txt</div>
    </div>

    <div class="file-info" id="fileInfo">
      <span class="fi-icon">📄</span>
      <span class="fi-name" id="fileName">—</span>
      <span class="fi-size" id="fileSize">—</span>
      <button class="fi-remove" onclick="removeFile()" title="Удалить">✕</button>
    </div>
  </div>

  <!-- Obfuscate button -->
  <button class="btn btn-primary" id="btnObfuscate" onclick="startObfuscation()" disabled>
    <span>🔒</span>
    <span>Обфусцировать</span>
  </button>

  <!-- Progress -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>

  <!-- Status -->
  <div class="status-bar" id="statusBar">
    <div class="st-icon"></div>
    <div>
      <div class="st-text" id="statusText">—</div>
      <div class="st-sub"  id="statusSub">—</div>
    </div>
  </div>

  <!-- Result buttons -->
  <div class="btn-group" id="btnGroup">
    <button class="btn btn-success" onclick="downloadFile()">
      <span>⬇️</span>
      <span>Скачать файл</span>
    </button>
    <button class="btn btn-tg" onclick="sendToTelegram()">
      <span>✈️</span>
      <span>Отправить в Telegram</span>
    </button>
    <button class="btn btn-secondary" onclick="resetAll()">
      <span>🔄</span>
      <span>Обфусцировать ещё</span>
    </button>
  </div>

  <!-- Demo notice -->
  <div class="demo-badge">
    <strong>⚠ Demo-режим</strong>
    Обфускация демонстрационная. Для продакшена используй
    PyArmor, ProGuard, javascript-obfuscator.
  </div>

</div>

<script>
const BASE_URL = '%%BASE_URL%%'; // подставляется из .env или задаётся вручную

// ── State ──────────────────────────────────────────────────────────────────────
let tg         = window.Telegram?.WebApp;
let userId     = tg?.initDataUnsafe?.user?.id ?? null;
let selectedLang = 'javascript';
let selectedFile = null;
let currentJobId = null;
let pollTimer    = null;

if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#0a0c10');
  tg.setBackgroundColor('#0a0c10');
}

// ── Language ───────────────────────────────────────────────────────────────────
function selectLang(btn) {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedLang = btn.dataset.lang;
}

// ── File handling ──────────────────────────────────────────────────────────────
function fileSelected() {
  const input = document.getElementById('fileInput');
  if (input.files[0]) setFile(input.files[0]);
}

function setFile(file) {
  selectedFile = file;
  document.getElementById('fileName').textContent = file.name;
  document.getElementById('fileSize').textContent = formatSize(file.size);
  document.getElementById('fileInfo').classList.add('show');
  document.getElementById('uploadZone').style.display = 'none';
  document.getElementById('btnObfuscate').disabled = false;

  // Auto-detect language
  const ext = file.name.split('.').pop().toLowerCase();
  const map = { js: 'javascript', py: 'python', java: 'java' };
  if (map[ext]) {
    document.querySelectorAll('.lang-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.lang === map[ext]);
    });
    selectedLang = map[ext];
  }
}

function removeFile() {
  selectedFile = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('fileInfo').classList.remove('show');
  document.getElementById('uploadZone').style.display = '';
  document.getElementById('btnObfuscate').disabled = true;
}

function dragOver(e) {
  e.preventDefault();
  document.getElementById('uploadZone').classList.add('drag-over');
}
function dragLeave(e) {
  document.getElementById('uploadZone').classList.remove('drag-over');
}
function dropFile(e) {
  e.preventDefault();
  dragLeave(e);
  const file = e.dataTransfer.files[0];
  if (file) setFile(file);
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1048576).toFixed(1) + ' MB';
}

// ── Obfuscation ────────────────────────────────────────────────────────────────
async function startObfuscation() {
  if (!selectedFile) return;

  const btn = document.getElementById('btnObfuscate');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div><span>Загрузка файла…</span>';

  setStatus('pending', 'Загрузка файла…', selectedFile.name);
  showProgress(15);

  try {
    // 1. Upload
    const form = new FormData();
    form.append('user_id', userId ?? 0);
    form.append('language', selectedLang);
    form.append('file', selectedFile);

    const upRes = await fetch(`${BASE_URL}/upload`, { method: 'POST', body: form });
    if (!upRes.ok) throw new Error(await upRes.text());
    const { job_id } = await upRes.json();
    currentJobId = job_id;

    showProgress(40);
    btn.innerHTML = '<div class="spinner"></div><span>Обфускация…</span>';
    setStatus('pending', 'Обфускация кода…', `Язык: ${selectedLang}`);

    // 2. Run obfuscation
    const obfRes = await fetch(`${BASE_URL}/obfuscate/${job_id}`, { method: 'POST' });
    if (!obfRes.ok) throw new Error(await obfRes.text());

    showProgress(80);

    // 3. Poll status
    await pollStatus(job_id);

  } catch (err) {
    showError(err.message ?? String(err));
    btn.disabled = false;
    btn.innerHTML = '<span>🔒</span><span>Обфусцировать</span>';
  }
}

async function pollStatus(jobId) {
  const btn = document.getElementById('btnObfuscate');

  for (let i = 0; i < 30; i++) {
    await sleep(800);
    try {
      const res = await fetch(`${BASE_URL}/status/${jobId}`);
      const data = await res.json();

      if (data.status === 'done') {
        showProgress(100, true);
        setStatus('done', '✅ Готово!', 'Обфускация завершена успешно');
        showResultBtns(true);
        btn.style.display = 'none';
        return;
      }
      if (data.status === 'error') {
        throw new Error(data.error ?? 'Ошибка обфускации');
      }
    } catch (err) {
      if (err.message !== 'Failed to fetch') throw err;
    }
  }
  throw new Error('Превышено время ожидания');
}

// ── Actions ────────────────────────────────────────────────────────────────────
function downloadFile() {
  if (!currentJobId) return;
  window.open(`${BASE_URL}/download/${currentJobId}`, '_blank');
}

async function sendToTelegram() {
  if (!currentJobId || !userId) {
    alert('Не удалось определить пользователя Telegram. Откройте через бота.');
    return;
  }
  const form = new FormData();
  form.append('user_id', userId);

  const btn = document.querySelector('.btn-tg');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div><span>Отправка…</span>';

  try {
    const res = await fetch(`${BASE_URL}/send/${currentJobId}`, { method: 'POST', body: form });
    if (!res.ok) throw new Error(await res.text());
    btn.innerHTML = '<span>✅</span><span>Отправлено!</span>';
    setTimeout(() => { btn.disabled = false; btn.innerHTML = '<span>✈️</span><span>Отправить в Telegram</span>'; }, 3000);
  } catch (err) {
    btn.disabled = false;
    btn.innerHTML = '<span>✈️</span><span>Отправить в Telegram</span>';
    alert('Ошибка: ' + (err.message ?? String(err)));
  }
}

function resetAll() {
  removeFile();
  currentJobId = null;
  document.getElementById('statusBar').className = 'status-bar';
  document.getElementById('progressWrap').className = 'progress-wrap';
  document.getElementById('btnGroup').className = 'btn-group';
  const btn = document.getElementById('btnObfuscate');
  btn.style.display = '';
  btn.disabled = true;
  btn.innerHTML = '<span>🔒</span><span>Обфусцировать</span>';
}

// ── UI helpers ─────────────────────────────────────────────────────────────────
function setStatus(type, text, sub) {
  const bar = document.getElementById('statusBar');
  bar.className = `status-bar show ${type}`;
  document.getElementById('statusText').textContent = text;
  document.getElementById('statusSub').textContent  = sub ?? '';
}

function showError(msg) {
  setStatus('error', '❌ Ошибка', msg);
  document.getElementById('progressWrap').classList.remove('show');
}

function showProgress(pct, done = false) {
  const wrap = document.getElementById('progressWrap');
  const bar  = document.getElementById('progressBar');
  wrap.classList.add('show');
  bar.style.width = pct + '%';
  if (done) bar.classList.add('done');
}

function showResultBtns(show) {
  document.getElementById('btnGroup').classList.toggle('show', show);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
</body>
</html>
